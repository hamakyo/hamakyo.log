name: Notion Sync

on:
  # 手動実行
  workflow_dispatch:
    inputs:
      debug:
        description: 'デバッグモードで実行'
        required: false
        default: false
        type: boolean
  
  # 定期実行（1時間毎）
  schedule:
    - cron: '0 */6 * * *'  # 6時間毎に実行

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: チェックアウト
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: pnpm セットアップ
      uses: pnpm/action-setup@v4
    
    - name: Node.js セットアップ
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'pnpm'
    
    - name: 依存関係をインストール
      run: pnpm install --frozen-lockfile
    
    - name: Notion同期実行
      env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.1-flash-lite' }}
        NOTION_SYNC_TAG: ${{ vars.NOTION_SYNC_TAG || 'Study.Log' }}
        NOTION_INTERNAL_TAGS: ${{ vars.NOTION_INTERNAL_TAGS || 'Study.Log,INBOX' }}
        NOTION_TAGS_PROPERTY: ${{ vars.NOTION_TAGS_PROPERTY || 'Tags' }}
        NOTION_PUBLIC_TAG_PROPERTY: ${{ vars.NOTION_PUBLIC_TAG_PROPERTY || 'ブログ表示' }}
        NOTION_TAG_DESCRIPTION_PROPERTY: ${{ vars.NOTION_TAG_DESCRIPTION_PROPERTY || 'タグの説明' }}
        NOTION_TAG_ARCHIVE_PROPERTY: ${{ vars.NOTION_TAG_ARCHIVE_PROPERTY || 'アーカイブ' }}
      run: |
        echo "🚀 Notion同期を開始します..."
        pnpm run sync-notion | tee "$RUNNER_TEMP/sync-output.txt"
    
    - name: 変更をコミット
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 全ての変更をステージング
        git add .
        
        # 変更があるかチェック（ステージング後）
        if git diff --cached --quiet; then
          echo "📝 変更はありません"
          exit 0
        fi
        
        # 変更されたファイルを表示
        echo "📋 変更されたファイル:"
        git diff --cached --name-status
        
        # コミット
        git commit -m "feat: Notionのメモを自動同期"
        
        # プッシュ
        git push
        
        echo "✅ 変更をプッシュしました"
    
    - name: 同期結果をサマリーに出力
      if: always()
      run: |
        if [ -f "$RUNNER_TEMP/sync-output.txt" ]; then
          awk '/^# 📊 同期結果サマリー/{flag=1} flag{print}' "$RUNNER_TEMP/sync-output.txt" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "# 📊 Notion 同期結果" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- 実行時間: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
        echo "- ブランチ: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- コミット: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
